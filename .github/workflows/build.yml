name: Build FREED APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev patch
          pip install buildozer==1.5.0 cython==0.29.33
      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: freed-apk
          path: bin/*.apk
